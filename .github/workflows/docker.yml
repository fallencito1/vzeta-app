name: CI-CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push myapp_container
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp_container:latest ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp_container:latest

      - name: Build & push mynginx_container
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mynginx_container:latest ./nginx
          docker push ${{ secrets.DOCKER_USERNAME }}/mynginx_container:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/myapp_container:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/mynginx_container:latest
            docker rm -f myapp_container mynginx_container || true
            docker network create vzeta-net || true
            docker run -d --name myapp_container --network vzeta-net \
              ${{ secrets.DOCKER_USERNAME }}/myapp_container:latest
            docker run -d --name mynginx_container --network vzeta-net -p 80:80 \
              -v /home/ubuntu/data:/usr/share/nginx/html/data \
              ${{ secrets.DOCKER_USERNAME }}/mynginx_container:latest
